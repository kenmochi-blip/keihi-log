<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>経費ログ｜領収書を撮るだけの経費記録アプリ</title>
  <meta name="description" content="領収書を撮るだけでAIが自動入力。Googleアカウントで使う経費記録アプリ。">
  <meta property="og:title" content="経費ログ｜領収書を撮るだけの経費記録アプリ">
  <meta property="og:description" content="領収書を撮るだけでAIが自動入力。Googleアカウントで使う経費記録アプリ。">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://keihi-log.vercel.app/">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0d6efd">
</head>
<body class="bg-light">

  <!-- ナビゲーション -->
  <nav class="navbar navbar-dark bg-primary sticky-top">
    <div class="container-fluid" style="max-width:480px;margin:0 auto;">
      <span class="navbar-brand fw-bold small"><i class="bi bi-receipt-cutoff me-1"></i><span id="navAppTitle">経費ログ</span></span>
      <div class="d-flex align-items-center gap-2">
        <a href="/faq" target="_blank" rel="noopener" class="btn btn-sm btn-outline-light" title="よくある質問">
          <i class="bi bi-question-circle"></i>
        </a>
        <button class="btn btn-sm btn-outline-light" id="btnLogout" title="ログアウト">
          <i class="bi bi-box-arrow-right"></i>
        </button>
      </div>
    </div>
  </nav>

  <!-- メインコンテンツ -->
  <div id="appMain" class="container-fluid" style="max-width:480px;margin:0 auto;padding-bottom:80px;">
    <!-- 初期スピナー（JSが起動するまで表示。Router.navigateで上書きされる） -->
    <div id="initialBoot" class="text-center py-5">
      <div class="spinner-border text-primary" role="status"></div>
      <div class="text-muted small mt-2">読み込み中...</div>
    </div>
  </div>

  <!-- ボトムナビゲーション -->
  <nav class="navbar fixed-bottom bg-white border-top shadow-sm">
    <div class="container-fluid justify-content-around" style="max-width:480px;margin:0 auto;">
      <button class="btn btn-link text-decoration-none nav-item-btn" data-view="submit">
        <i class="bi bi-plus-circle-fill d-block" style="font-size:1.4rem;"></i>
        <span style="font-size:0.82rem;">登録</span>
      </button>
      <button class="btn btn-link text-decoration-none nav-item-btn" data-view="list">
        <i class="bi bi-list-ul d-block" style="font-size:1.4rem;"></i>
        <span style="font-size:0.82rem;">一覧</span>
      </button>
      <button class="btn btn-link text-decoration-none nav-item-btn" data-view="summary">
        <i class="bi bi-bar-chart-fill d-block" style="font-size:1.4rem;"></i>
        <span style="font-size:0.82rem;">集計</span>
      </button>
      <button class="btn btn-link text-decoration-none nav-item-btn" data-view="settings">
        <i class="bi bi-gear-fill d-block" style="font-size:1.4rem;"></i>
        <span style="font-size:0.82rem;">設定</span>
      </button>
    </div>
  </nav>

  <!-- トースト通知 -->
  <div id="toastContainer" class="position-fixed top-0 start-50 translate-middle-x p-3" style="z-index:9999;width:100%;max-width:480px;"></div>

  <!-- 確認モーダル -->
  <div class="modal fade" id="confirmModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-body text-center py-4" id="confirmModalBody"></div>
        <div class="modal-footer justify-content-center border-0 pt-0">
          <button class="btn btn-secondary" data-bs-dismiss="modal" id="confirmCancel">キャンセル</button>
          <button class="btn btn-primary" id="confirmOk">OK</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ローディングオーバーレイ -->
  <div id="loadingOverlay" class="d-none position-fixed top-0 start-0 w-100 h-100 d-flex align-items-center justify-content-center" style="background:rgba(0,0,0,0.4);z-index:10000;">
    <div class="text-center text-white">
      <div class="spinner-border mb-2" role="status"></div>
      <div id="loadingMsg" class="small">処理中...</div>
    </div>
  </div>

  <!-- グローバルエラーハンドラ：未捕捉のJSエラーで真っ白にならないように -->
  <script>
    window.addEventListener('error', function(ev) {
      var main = document.getElementById('appMain');
      if (!main) return;
      // すでにビューが描画されていれば何もしない（バインド中のエラーで画面を消さない）
      if (main.querySelector('h5, .pt-3')) return;
      main.innerHTML = '<div class="pt-4"><div class="alert alert-danger small">' +
        '<i class="bi bi-exclamation-triangle-fill me-2"></i>' +
        '初期化エラー: ' + (ev.message || 'スクリプトの読み込みに失敗しました') +
        '</div><button class="btn btn-outline-secondary btn-sm" onclick="location.reload()">' +
        '<i class="bi bi-arrow-clockwise me-1"></i>再読み込み</button></div>';
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/demo.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/sheets.js"></script>
  <script src="js/drive.js"></script>
  <script src="js/gemini.js"></script>
  <script src="js/license.js"></script>
  <script src="js/setup.js"></script>
  <script src="js/views/submit.js"></script>
  <script src="js/views/list.js"></script>
  <script src="js/views/summary.js"></script>
  <script src="js/views/settings.js"></script>
  <script src="js/views/admin.js"></script>
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
