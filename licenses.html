<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ライセンス管理 — 経費ログ</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">
  <div class="container py-4" style="max-width:900px;">
    <h4 class="fw-bold mb-4"><i class="bi bi-key-fill me-2 text-primary"></i>ライセンス管理</h4>

    <!-- 認証フォーム -->
    <div id="authArea" class="card mb-4">
      <div class="card-body">
        <div class="input-group" style="max-width:400px;">
          <input type="password" class="form-control" id="inputSecret" placeholder="管理シークレット">
          <button class="btn btn-primary" id="btnLoad">読み込む</button>
        </div>
      </div>
    </div>

    <!-- 統計サマリー -->
    <div id="summary" class="d-none">
      <div class="row g-3 mb-4">
        <div class="col-6 col-md-3">
          <div class="card text-center">
            <div class="card-body py-3">
              <div class="h3 fw-bold text-primary mb-0" id="statTotal">—</div>
              <div class="small text-muted">総発行数</div>
            </div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="card text-center">
            <div class="card-body py-3">
              <div class="h3 fw-bold text-success mb-0" id="statActive">—</div>
              <div class="small text-muted">有効</div>
            </div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="card text-center">
            <div class="card-body py-3">
              <div class="h3 fw-bold text-warning mb-0" id="statExpired">—</div>
              <div class="small text-muted">期限切れ</div>
            </div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="card text-center">
            <div class="card-body py-3">
              <div class="h3 fw-bold text-danger mb-0" id="statSuspended">—</div>
              <div class="small text-muted">停止中</div>
            </div>
          </div>
        </div>
      </div>

      <!-- 月次サマリー -->
      <div class="card mb-4">
        <div class="card-header py-2 fw-bold small d-flex align-items-center justify-content-between">
          <span><i class="bi bi-bar-chart-line me-1 text-primary"></i>月次サマリー</span>
          <input type="month" class="form-control form-control-sm w-auto" id="monthPicker">
        </div>
        <div class="card-body py-3">
          <div class="row g-3 mb-3">
            <div class="col-6 col-md-3">
              <div class="border rounded p-2 text-center">
                <div class="h4 fw-bold text-primary mb-0" id="mNew">—</div>
                <div class="small text-muted">新規登録</div>
              </div>
            </div>
            <div class="col-6 col-md-3">
              <div class="border rounded p-2 text-center">
                <div class="h4 fw-bold text-success mb-0" id="mPaid">—</div>
                <div class="small text-muted">有料購入 <span class="badge bg-success" style="font-size:0.6rem;">Stripe</span></div>
              </div>
            </div>
            <div class="col-6 col-md-3">
              <div class="border rounded p-2 text-center">
                <div class="h4 fw-bold text-secondary mb-0" id="mManual">—</div>
                <div class="small text-muted">手動発行 <span class="badge bg-secondary" style="font-size:0.6rem;">無料等</span></div>
              </div>
            </div>
            <div class="col-6 col-md-3">
              <div class="border rounded p-2 text-center">
                <div class="h4 fw-bold text-warning mb-0" id="mUpgrade">—</div>
                <div class="small text-muted">無料→有料転換</div>
              </div>
            </div>
            <div class="col-6 col-md-3">
              <div class="border rounded p-2 text-center">
                <div class="h4 fw-bold text-danger mb-0" id="mChurn">—</div>
                <div class="small text-muted">離脱（期限切れ）</div>
              </div>
            </div>
          </div>
          <!-- 当月新規一覧 -->
          <div id="mNewList" class="d-none">
            <div class="small fw-semibold text-muted mb-1">当月新規登録</div>
            <table class="table table-sm mb-0" style="font-size:0.78rem;">
              <thead class="table-light"><tr><th>発行日</th><th>氏名</th><th>ビジネス名</th><th>メール</th><th>プラン</th><th>種別</th></tr></thead>
              <tbody id="mNewTable"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- 手動発行フォーム -->
      <div class="card mb-4">
        <div class="card-header py-2 fw-bold small"><i class="bi bi-plus-circle me-1 text-success"></i>手動発行</div>
        <div class="card-body py-3">
          <div class="row g-2">
            <div class="col-12 col-md-4">
              <input type="email" class="form-control form-control-sm" id="issueEmail" placeholder="メールアドレス *">
            </div>
            <div class="col-12 col-md-3">
              <input type="text" class="form-control form-control-sm" id="issueCompany" placeholder="会社名・氏名">
            </div>
            <div class="col-6 col-md-2">
              <select class="form-select form-select-sm" id="issuePlan">
                <option value="standard">標準</option>
                <option value="solo">ソロ</option>
                <option value="team">チーム</option>
              </select>
            </div>
            <div class="col-6 col-md-2">
              <input type="date" class="form-control form-control-sm" id="issueExpiry">
            </div>
            <div class="col-12 col-md-1 d-grid">
              <button class="btn btn-success btn-sm" id="btnIssue">発行</button>
            </div>
          </div>
          <div class="mt-2 small" id="issueMsg"></div>
        </div>
      </div>

      <!-- フィルター -->
      <div class="d-flex gap-2 mb-3 flex-wrap">
        <input type="text" class="form-control form-control-sm" id="filterText"
          placeholder="メール・会社名で検索" style="max-width:250px;">
        <select class="form-select form-select-sm" id="filterStatus" style="max-width:150px;">
          <option value="">全ステータス</option>
          <option value="active">有効</option>
          <option value="expired">期限切れ</option>
          <option value="suspended">停止中</option>
        </select>
        <button class="btn btn-outline-secondary btn-sm" id="btnCsvExport">
          <i class="bi bi-download me-1"></i>CSV
        </button>
      </div>

      <!-- テーブル -->
      <div class="card">
        <div class="table-responsive">
          <table class="table table-sm table-hover mb-0">
            <thead class="table-light">
              <tr>
                <th style="font-size:0.78rem;">発行日</th>
                <th style="font-size:0.78rem;">氏名</th>
                <th style="font-size:0.78rem;">ビジネス名</th>
                <th style="font-size:0.78rem;">メール</th>
                <th style="font-size:0.78rem;">ライセンスキー</th>
                <th style="font-size:0.78rem;">プラン</th>
                <th style="font-size:0.78rem;">有効期限</th>
                <th style="font-size:0.78rem;">今月申請数</th>
                <th style="font-size:0.78rem;">先月申請数</th>
                <th style="font-size:0.78rem;">ステータス</th>
                <th style="font-size:0.78rem;"></th>
              </tr>
            </thead>
            <tbody id="licenseTable"></tbody>
          </table>
        </div>
      </div>
      <div id="noResult" class="text-center text-muted py-3 d-none">該当なし</div>
    </div>
  </div>

  <script>
    let _all = [];
    let _secret = '';

    document.getElementById('btnLoad').addEventListener('click', load);
    document.getElementById('inputSecret').addEventListener('keydown', e => { if (e.key === 'Enter') load(); });
    document.getElementById('btnIssue').addEventListener('click', issueLicense);
    document.getElementById('filterText').addEventListener('input', render);
    document.getElementById('filterStatus').addEventListener('change', render);
    document.getElementById('btnCsvExport').addEventListener('click', exportCsv);

    // 月次ピッカーの初期値（当月）
    document.getElementById('monthPicker').value = new Date().toISOString().slice(0, 7);
    document.getElementById('monthPicker').addEventListener('change', updateMonthly);

    // 有効期限のデフォルト値（1年後）をセット
    const _defaultExpiry = () => {
      const d = new Date(); d.setFullYear(d.getFullYear() + 1);
      return d.toISOString().split('T')[0];
    };
    document.getElementById('issueExpiry').value = _defaultExpiry();

    async function issueLicense() {
      const email   = document.getElementById('issueEmail').value.trim();
      const company = document.getElementById('issueCompany').value.trim();
      const plan    = document.getElementById('issuePlan').value;
      const expiry  = document.getElementById('issueExpiry').value;
      const msg     = document.getElementById('issueMsg');
      if (!email) { msg.innerHTML = '<span class="text-danger">メールアドレスは必須です</span>'; return; }
      msg.innerHTML = '<span class="text-muted">発行中...</span>';
      const resp = await fetch(`/api/admin-licenses?secret=${encodeURIComponent(_secret)}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, company, plan, expiresAt: expiry }),
      });
      const data = await resp.json();
      if (!resp.ok) {
        if (data.error === 'duplicate_email') {
          msg.innerHTML = `<span class="text-warning">このメールには既存キーがあります: <code>${esc(data.existingKey)}</code></span>`;
        } else {
          msg.innerHTML = `<span class="text-danger">エラー: ${esc(data.error)}</span>`;
        }
        return;
      }
      msg.innerHTML = `<span class="text-success"><i class="bi bi-check-circle me-1"></i>発行しました: <code>${esc(data.key)}</code></span>`;
      document.getElementById('issueEmail').value   = '';
      document.getElementById('issueCompany').value = '';
      document.getElementById('issueExpiry').value  = _defaultExpiry();
      // テーブルに追記
      _all.unshift(data);
      updateStats();
      render();
    }

    async function load() {
      _secret = document.getElementById('inputSecret').value.trim();
      const resp = await fetch(`/api/admin-licenses?secret=${encodeURIComponent(_secret)}`);
      if (!resp.ok) { alert('認証に失敗しました'); return; }
      const data = await resp.json();
      _all = data.licenses;
      document.getElementById('authArea').classList.add('d-none');
      document.getElementById('summary').classList.remove('d-none');
      updateStats();
      updateMonthly();
      render();
    }

    function updateMonthly() {
      const ym = document.getElementById('monthPicker').value;
      if (!ym) return;

      const planLabel = { solo: 'ソロ', team: 'チーム', standard: '標準' };
      const planBadge = { solo: 'secondary', team: 'primary', standard: 'secondary' };

      const newRegs   = _all.filter(l => (l.createdAt || '').startsWith(ym));
      const paid      = newRegs.filter(l => !!l.stripeSessionId);
      const manual    = newRegs.filter(l => !l.stripeSessionId);
      const upgrades  = _all.filter(l => (l.upgradedAt || '').startsWith(ym));
      const churn     = _all.filter(l => (l.expiresAt || '').startsWith(ym) && getStatus(l) !== 'active');

      document.getElementById('mNew').textContent     = newRegs.length;
      document.getElementById('mPaid').textContent    = paid.length;
      document.getElementById('mManual').textContent  = manual.length;
      document.getElementById('mUpgrade').textContent = upgrades.length;
      document.getElementById('mChurn').textContent   = churn.length;

      const listEl = document.getElementById('mNewList');
      const tbody  = document.getElementById('mNewTable');
      if (newRegs.length > 0) {
        tbody.innerHTML = newRegs.map(l => {
          const plan = l.plan || 'standard';
          const kind = l.stripeSessionId
            ? '<span class="badge bg-success" style="font-size:0.65rem;">有料</span>'
            : '<span class="badge bg-secondary" style="font-size:0.65rem;">手動</span>';
          return `<tr>
            <td>${(l.createdAt || '').split('T')[0]}</td>
            <td>${esc(l.customerName || l.company || '')}</td>
            <td>${esc(l.businessName || '')}</td>
            <td>${esc(l.email || '')}</td>
            <td><span class="badge bg-${planBadge[plan]}" style="font-size:0.65rem;">${planLabel[plan] || plan}</span></td>
            <td>${kind}</td>
          </tr>`;
        }).join('');
        listEl.classList.remove('d-none');
      } else {
        listEl.classList.add('d-none');
      }
    }

    function getStatus(lic) {
      if (lic.suspended) return 'suspended';
      if (lic.expiresAt && new Date(lic.expiresAt) < new Date()) return 'expired';
      return 'active';
    }

    function updateStats() {
      document.getElementById('statTotal').textContent = _all.length;
      document.getElementById('statActive').textContent    = _all.filter(l => getStatus(l) === 'active').length;
      document.getElementById('statExpired').textContent   = _all.filter(l => getStatus(l) === 'expired').length;
      document.getElementById('statSuspended').textContent = _all.filter(l => getStatus(l) === 'suspended').length;
    }

    function render() {
      const text   = document.getElementById('filterText').value.toLowerCase();
      const status = document.getElementById('filterStatus').value;
      const filtered = _all.filter(l => {
        if (text && !`${l.company}${l.customerName}${l.businessName}${l.email}`.toLowerCase().includes(text)) return false;
        if (status && getStatus(l) !== status) return false;
        return true;
      });

      const statusBadge = { active: 'success', expired: 'warning', suspended: 'danger' };
      const statusLabel = { active: '有効', expired: '期限切れ', suspended: '停止中' };
      const planLabel   = { solo: 'ソロ', team: 'チーム', standard: '標準' };
      const planBadge   = { solo: 'secondary', team: 'primary', standard: 'secondary' };

      const tbody = document.getElementById('licenseTable');
      tbody.innerHTML = filtered.map(l => {
        const st   = getStatus(l);
        const date = l.createdAt ? l.createdAt.split('T')[0] : '—';
        const plan = l.plan || 'standard';
        const usageThis = l.usageThis ?? '—';
        const usageLast = l.usageLast ?? '—';
        return `<tr data-key="${esc(l.key)}">
          <td style="font-size:0.78rem;">${date}</td>
          <td style="font-size:0.78rem;">${esc(l.customerName || l.company || '')}</td>
          <td style="font-size:0.78rem;">${esc(l.businessName || '')}</td>
          <td style="font-size:0.78rem;">${esc(l.email || '')}</td>
          <td style="font-size:0.72rem;font-family:monospace;">${esc(l.key)}</td>
          <td><span class="badge bg-${planBadge[plan]}" style="font-size:0.65rem;">${planLabel[plan] || plan}</span></td>
          <td style="font-size:0.78rem;">${l.expiresAt || '—'}</td>
          <td style="font-size:0.78rem;text-align:right;font-weight:${usageThis > 0 ? '600' : 'normal'};">${usageThis}</td>
          <td style="font-size:0.78rem;text-align:right;color:#888;">${usageLast}</td>
          <td><span class="badge bg-${statusBadge[st]}" style="font-size:0.65rem;">${statusLabel[st]}</span></td>
          <td class="text-nowrap">
            ${!l.stripeSessionId && !l.upgradedAt ? `<button class="btn btn-outline-warning btn-sm py-0 px-1 me-1 btn-upgrade" data-key="${esc(l.key)}" title="有料転換としてマーク"><i class="bi bi-arrow-up-circle"></i></button>` : ''}
            <button class="btn btn-outline-danger btn-sm py-0 px-1 btn-delete" data-key="${esc(l.key)}" title="削除"><i class="bi bi-trash"></i></button>
          </td>
        </tr>`;
      }).join('');

      tbody.querySelectorAll('.btn-upgrade').forEach(btn => {
        btn.addEventListener('click', () => upgradeLicense(btn.dataset.key));
      });
      tbody.querySelectorAll('.btn-delete').forEach(btn => {
        btn.addEventListener('click', () => deleteLicense(btn.dataset.key));
      });

      document.getElementById('noResult').classList.toggle('d-none', filtered.length > 0);
    }

    function exportCsv() {
      const header = ['発行日','氏名','ビジネス名','メール','ライセンスキー','プラン','有効期限','ステータス'];
      const statusLabel = { active: '有効', expired: '期限切れ', suspended: '停止中' };
      const planLabel   = { solo: 'ソロ', team: 'チーム', standard: '標準' };
      const rows = _all.map(l => [
        l.createdAt?.split('T')[0] || '',
        l.customerName || l.company || '', l.businessName || '', l.email || '',
        l.key, planLabel[l.plan] || l.plan || '', l.expiresAt || '', statusLabel[getStatus(l)]
      ]);
      const csv = [header, ...rows].map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' }));
      a.download = `licenses_${new Date().toISOString().split('T')[0]}.csv`;
      a.click();
    }

    async function upgradeLicense(key) {
      if (!confirm(`有料転換としてマークしますか？\n${key}\n\n有効期限が1年延長されます（Stripe外の決済用）。`)) return;
      const resp = await fetch(`/api/admin-licenses?secret=${encodeURIComponent(_secret)}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ key, action: 'upgrade' }),
      });
      if (!resp.ok) { alert('処理に失敗しました'); return; }
      const data = await resp.json();
      const idx = _all.findIndex(l => l.key === key);
      if (idx !== -1) _all[idx] = { ..._all[idx], ...data };
      updateStats();
      updateMonthly();
      render();
    }

    async function deleteLicense(key) {
      if (!confirm(`削除しますか？\n${key}\n\nこの操作は取り消せません。`)) return;
      const resp = await fetch(`/api/admin-licenses?secret=${encodeURIComponent(_secret)}&key=${encodeURIComponent(key)}`, { method: 'DELETE' });
      if (!resp.ok) { alert('削除に失敗しました'); return; }
      _all = _all.filter(l => l.key !== key);
      updateStats();
      render();
    }

    function esc(s) {
      return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
  </script>
</body>
</html>
