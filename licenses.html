<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ライセンス管理 — 経費ログ</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { font-size: 0.875rem; }
    .stat-card { border-top: 3px solid; }
    .stat-card.primary   { border-top-color: #0d6efd; }
    .stat-card.success   { border-top-color: #198754; }
    .stat-card.warning   { border-top-color: #ffc107; }
    .stat-card.danger    { border-top-color: #dc3545; }
    .license-table th { white-space: nowrap; font-size: 0.75rem; font-weight: 600; color: #555; background: #f8f9fa; }
    .license-table td { vertical-align: middle; }
    .license-table .col-date    { width: 88px;  white-space: nowrap; }
    .license-table .col-customer{ width: 180px; }
    .license-table .col-email   { width: 190px; }
    .license-table .col-key     { width: 185px; }
    .license-table .col-plan    { width: 64px;  text-align: center; }
    .license-table .col-expiry  { width: 88px;  white-space: nowrap; }
    .license-table .col-usage   { width: 60px;  text-align: right; }
    .license-table .col-status  { width: 78px;  text-align: center; }
    .license-table .col-action  { width: 68px;  text-align: right; white-space: nowrap; }
    .key-mono { font-family: 'Menlo','Consolas',monospace; font-size: 0.7rem; letter-spacing: 0.03em; color: #333; }
    .customer-name { font-weight: 500; font-size: 0.8rem; }
    .customer-biz  { font-size: 0.72rem; color: #666; margin-top: 1px; }
    .email-cell    { font-size: 0.78rem; color: #444; word-break: break-all; }
    .section-header { font-size: 0.8rem; font-weight: 600; color: #444; margin-bottom: 0; }
  </style>
</head>
<body class="bg-light">

  <nav class="navbar navbar-dark bg-primary mb-4 py-2">
    <div class="container-fluid" style="max-width:1300px;">
      <span class="navbar-brand fw-bold small mb-0">
        <i class="bi bi-key-fill me-2"></i>経費ログ — ライセンス管理
      </span>
    </div>
  </nav>

  <div class="container-fluid px-4" style="max-width:1300px;">

    <!-- 認証フォーム -->
    <div id="authArea" class="card shadow-sm mb-4" style="max-width:420px;">
      <div class="card-body p-3">
        <p class="text-muted small mb-2">管理シークレットを入力してください</p>
        <div class="input-group">
          <input type="password" class="form-control" id="inputSecret" placeholder="管理シークレット">
          <button class="btn btn-primary" id="btnLoad"><i class="bi bi-unlock me-1"></i>読み込む</button>
        </div>
      </div>
    </div>

    <div id="summary" class="d-none">

      <!-- KPI カード -->
      <div class="row g-3 mb-4">
        <div class="col-6 col-md-3">
          <div class="card shadow-sm stat-card primary">
            <div class="card-body py-3 text-center">
              <div class="h2 fw-bold text-primary mb-0" id="statTotal">—</div>
              <div class="small text-muted">総発行数</div>
            </div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="card shadow-sm stat-card success">
            <div class="card-body py-3 text-center">
              <div class="h2 fw-bold text-success mb-0" id="statActive">—</div>
              <div class="small text-muted">有効</div>
            </div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="card shadow-sm stat-card warning">
            <div class="card-body py-3 text-center">
              <div class="h2 fw-bold text-warning mb-0" id="statExpired">—</div>
              <div class="small text-muted">期限切れ</div>
            </div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="card shadow-sm stat-card danger">
            <div class="card-body py-3 text-center">
              <div class="h2 fw-bold text-danger mb-0" id="statSuspended">—</div>
              <div class="small text-muted">停止中</div>
            </div>
          </div>
        </div>
      </div>

      <div class="row g-3 mb-4">

        <!-- 月次サマリー -->
        <div class="col-12 col-lg-6">
          <div class="card shadow-sm h-100">
            <div class="card-header bg-white py-2 d-flex align-items-center justify-content-between">
              <span class="section-header"><i class="bi bi-bar-chart-line me-1 text-primary"></i>月次サマリー</span>
              <input type="month" class="form-control form-control-sm w-auto" id="monthPicker">
            </div>
            <div class="card-body py-3">
              <div class="row g-2 mb-3">
                <div class="col-4">
                  <div class="border rounded p-2 text-center">
                    <div class="h5 fw-bold text-primary mb-0" id="mNew">—</div>
                    <div class="x-small text-muted" style="font-size:0.7rem;">新規登録</div>
                  </div>
                </div>
                <div class="col-4">
                  <div class="border rounded p-2 text-center">
                    <div class="h5 fw-bold text-success mb-0" id="mPaid">—</div>
                    <div class="x-small text-muted" style="font-size:0.7rem;">有料 <span class="badge bg-success" style="font-size:0.55rem;">Stripe</span></div>
                  </div>
                </div>
                <div class="col-4">
                  <div class="border rounded p-2 text-center">
                    <div class="h5 fw-bold text-secondary mb-0" id="mManual">—</div>
                    <div class="x-small text-muted" style="font-size:0.7rem;">手動発行</div>
                  </div>
                </div>
                <div class="col-4">
                  <div class="border rounded p-2 text-center">
                    <div class="h5 fw-bold text-warning mb-0" id="mUpgrade">—</div>
                    <div class="x-small text-muted" style="font-size:0.7rem;">無料→有料</div>
                  </div>
                </div>
                <div class="col-4">
                  <div class="border rounded p-2 text-center">
                    <div class="h5 fw-bold text-danger mb-0" id="mChurn">—</div>
                    <div class="x-small text-muted" style="font-size:0.7rem;">離脱</div>
                  </div>
                </div>
              </div>
              <div id="mNewList" class="d-none">
                <div class="small fw-semibold text-muted mb-1 border-top pt-2">当月新規登録</div>
                <div class="table-responsive">
                  <table class="table table-sm mb-0" style="font-size:0.75rem;">
                    <thead class="table-light">
                      <tr><th>発行日</th><th>顧客</th><th>メール</th><th>プラン</th><th>種別</th></tr>
                    </thead>
                    <tbody id="mNewTable"></tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- 手動発行フォーム -->
        <div class="col-12 col-lg-6">
          <div class="card shadow-sm h-100">
            <div class="card-header bg-white py-2">
              <span class="section-header"><i class="bi bi-plus-circle me-1 text-success"></i>手動発行</span>
            </div>
            <div class="card-body py-3">
              <div class="row g-2">
                <div class="col-12">
                  <input type="email" class="form-control form-control-sm" id="issueEmail" placeholder="メールアドレス *">
                </div>
                <div class="col-12">
                  <input type="text" class="form-control form-control-sm" id="issueCompany" placeholder="会社名・氏名（任意）">
                </div>
                <div class="col-5">
                  <select class="form-select form-select-sm" id="issuePlan">
                    <option value="standard">標準</option>
                    <option value="solo">ソロ</option>
                    <option value="team">チーム</option>
                  </select>
                </div>
                <div class="col-5">
                  <input type="date" class="form-control form-control-sm" id="issueExpiry">
                </div>
                <div class="col-2 d-grid">
                  <button class="btn btn-success btn-sm" id="btnIssue">発行</button>
                </div>
              </div>
              <div class="mt-2 small" id="issueMsg"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- フィルター & テーブル -->
      <div class="card shadow-sm">
        <div class="card-header bg-white py-2 d-flex align-items-center gap-2 flex-wrap">
          <span class="section-header me-auto"><i class="bi bi-list-ul me-1 text-primary"></i>発行一覧 <span class="text-muted fw-normal" id="filteredCount"></span></span>
          <input type="text" class="form-control form-control-sm" id="filterText"
            placeholder="氏名・ビジネス名・メールで検索" style="max-width:220px;">
          <select class="form-select form-select-sm" id="filterStatus" style="max-width:130px;">
            <option value="">全ステータス</option>
            <option value="active">有効</option>
            <option value="expired">期限切れ</option>
            <option value="suspended">停止中</option>
          </select>
          <button class="btn btn-outline-secondary btn-sm" id="btnCsvExport">
            <i class="bi bi-download me-1"></i>CSV
          </button>
        </div>
        <div class="table-responsive">
          <table class="table table-sm table-hover license-table mb-0">
            <thead>
              <tr>
                <th class="col-date ps-3">発行日</th>
                <th class="col-customer">顧客</th>
                <th class="col-email">メール</th>
                <th class="col-key">ライセンスキー</th>
                <th class="col-plan">プラン</th>
                <th class="col-expiry">有効期限</th>
                <th class="col-usage" title="今月の申請数">今月</th>
                <th class="col-usage" title="先月の申請数">先月</th>
                <th class="col-status">ステータス</th>
                <th class="col-action pe-3"></th>
              </tr>
            </thead>
            <tbody id="licenseTable"></tbody>
          </table>
        </div>
        <div id="noResult" class="text-center text-muted py-4 d-none">
          <i class="bi bi-inbox me-1"></i>該当なし
        </div>
      </div>

    </div><!-- /summary -->
  </div><!-- /container -->

  <script>
    let _all = [];
    let _secret = '';

    document.getElementById('btnLoad').addEventListener('click', load);
    document.getElementById('inputSecret').addEventListener('keydown', e => { if (e.key === 'Enter') load(); });
    document.getElementById('btnIssue').addEventListener('click', issueLicense);
    document.getElementById('filterText').addEventListener('input', render);
    document.getElementById('filterStatus').addEventListener('change', render);
    document.getElementById('btnCsvExport').addEventListener('click', exportCsv);

    document.getElementById('monthPicker').value = new Date().toISOString().slice(0, 7);
    document.getElementById('monthPicker').addEventListener('change', updateMonthly);

    const _defaultExpiry = () => {
      const d = new Date(); d.setFullYear(d.getFullYear() + 1);
      return d.toISOString().split('T')[0];
    };
    document.getElementById('issueExpiry').value = _defaultExpiry();

    async function issueLicense() {
      const email   = document.getElementById('issueEmail').value.trim();
      const company = document.getElementById('issueCompany').value.trim();
      const plan    = document.getElementById('issuePlan').value;
      const expiry  = document.getElementById('issueExpiry').value;
      const msg     = document.getElementById('issueMsg');
      if (!email) { msg.innerHTML = '<span class="text-danger">メールアドレスは必須です</span>'; return; }
      msg.innerHTML = '<span class="text-muted">発行中...</span>';
      const resp = await fetch(`/api/admin-licenses?secret=${encodeURIComponent(_secret)}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, company, plan, expiresAt: expiry }),
      });
      const data = await resp.json();
      if (!resp.ok) {
        if (data.error === 'duplicate_email') {
          msg.innerHTML = `<span class="text-warning">このメールには既存キーがあります: <code>${esc(data.existingKey)}</code></span>`;
        } else {
          msg.innerHTML = `<span class="text-danger">エラー: ${esc(data.error)}</span>`;
        }
        return;
      }
      msg.innerHTML = `<span class="text-success"><i class="bi bi-check-circle me-1"></i>発行しました: <code>${esc(data.key)}</code></span>`;
      document.getElementById('issueEmail').value   = '';
      document.getElementById('issueCompany').value = '';
      document.getElementById('issueExpiry').value  = _defaultExpiry();
      _all.unshift(data);
      updateStats();
      render();
    }

    async function load() {
      _secret = document.getElementById('inputSecret').value.trim();
      const resp = await fetch(`/api/admin-licenses?secret=${encodeURIComponent(_secret)}`);
      if (!resp.ok) { alert('認証に失敗しました'); return; }
      const data = await resp.json();
      _all = data.licenses;
      document.getElementById('authArea').classList.add('d-none');
      document.getElementById('summary').classList.remove('d-none');
      updateStats();
      updateMonthly();
      render();
    }

    function updateMonthly() {
      const ym = document.getElementById('monthPicker').value;
      if (!ym) return;

      const planLabel = { solo: 'ソロ', team: 'チーム', standard: '標準' };
      const planBadge = { solo: 'secondary', team: 'primary', standard: 'secondary' };

      const newRegs  = _all.filter(l => (l.createdAt || '').startsWith(ym));
      const paid     = newRegs.filter(l => !!l.stripeSessionId);
      const manual   = newRegs.filter(l => !l.stripeSessionId);
      const upgrades = _all.filter(l => (l.upgradedAt || '').startsWith(ym));
      const churn    = _all.filter(l => (l.expiresAt || '').startsWith(ym) && getStatus(l) !== 'active');

      document.getElementById('mNew').textContent     = newRegs.length;
      document.getElementById('mPaid').textContent    = paid.length;
      document.getElementById('mManual').textContent  = manual.length;
      document.getElementById('mUpgrade').textContent = upgrades.length;
      document.getElementById('mChurn').textContent   = churn.length;

      const listEl = document.getElementById('mNewList');
      const tbody  = document.getElementById('mNewTable');
      if (newRegs.length > 0) {
        tbody.innerHTML = newRegs.map(l => {
          const plan = l.plan || 'standard';
          const kind = l.stripeSessionId
            ? '<span class="badge bg-success" style="font-size:0.6rem;">有料</span>'
            : '<span class="badge bg-secondary" style="font-size:0.6rem;">手動</span>';
          const customerLabel = _customerLabel(l);
          return `<tr>
            <td>${(l.createdAt || '').split('T')[0]}</td>
            <td>${customerLabel}</td>
            <td class="email-cell">${esc(l.email || '')}</td>
            <td><span class="badge bg-${planBadge[plan]}" style="font-size:0.6rem;">${planLabel[plan] || plan}</span></td>
            <td>${kind}</td>
          </tr>`;
        }).join('');
        listEl.classList.remove('d-none');
      } else {
        listEl.classList.add('d-none');
      }
    }

    function _customerLabel(l) {
      const name = esc(l.customerName || l.company || '');
      const biz  = esc(l.businessName || '');
      if (!name && !biz) return '<span class="text-muted">—</span>';
      if (biz && name && biz !== name) {
        return `<div class="customer-name">${name}</div><div class="customer-biz">${biz}</div>`;
      }
      return `<div class="customer-name">${biz || name}</div>`;
    }

    function getStatus(lic) {
      if (lic.suspended) return 'suspended';
      if (lic.expiresAt && new Date(lic.expiresAt) < new Date()) return 'expired';
      return 'active';
    }

    function updateStats() {
      document.getElementById('statTotal').textContent     = _all.length;
      document.getElementById('statActive').textContent    = _all.filter(l => getStatus(l) === 'active').length;
      document.getElementById('statExpired').textContent   = _all.filter(l => getStatus(l) === 'expired').length;
      document.getElementById('statSuspended').textContent = _all.filter(l => getStatus(l) === 'suspended').length;
    }

    function render() {
      const text   = document.getElementById('filterText').value.toLowerCase();
      const status = document.getElementById('filterStatus').value;
      const filtered = _all.filter(l => {
        if (text && !`${l.company}${l.customerName}${l.businessName}${l.email}`.toLowerCase().includes(text)) return false;
        if (status && getStatus(l) !== status) return false;
        return true;
      });

      const countEl = document.getElementById('filteredCount');
      countEl.textContent = text || status
        ? `（${filtered.length} / ${_all.length}件）`
        : `（${_all.length}件）`;

      const statusBadge = { active: 'success', expired: 'warning text-dark', suspended: 'danger' };
      const statusLabel = { active: '有効', expired: '期限切れ', suspended: '停止中' };
      const planLabel   = { solo: 'ソロ', team: 'チーム', standard: '標準' };
      const planBadge   = { solo: 'secondary', team: 'primary', standard: 'light text-dark' };

      const tbody = document.getElementById('licenseTable');
      tbody.innerHTML = filtered.map(l => {
        const st   = getStatus(l);
        const date = l.createdAt ? l.createdAt.split('T')[0] : '—';
        const plan = l.plan || 'standard';
        const usageThis = l.usageThis ?? '—';
        const usageLast = l.usageLast ?? '—';
        const customerLabel = _customerLabel(l);
        const isStripe = !!l.stripeSessionId;
        return `<tr data-key="${esc(l.key)}">
          <td class="col-date ps-3" style="font-size:0.78rem;color:#555;">${date}</td>
          <td class="col-customer">
            ${customerLabel}
            ${isStripe ? '<span class="badge bg-success ms-0" style="font-size:0.55rem;vertical-align:middle;">Stripe</span>' : '<span class="badge bg-light text-secondary border ms-0" style="font-size:0.55rem;vertical-align:middle;">手動</span>'}
          </td>
          <td class="col-email email-cell">${esc(l.email || '')}</td>
          <td class="col-key"><span class="key-mono">${esc(l.key)}</span></td>
          <td class="col-plan"><span class="badge bg-${planBadge[plan]}" style="font-size:0.65rem;">${planLabel[plan] || plan}</span></td>
          <td class="col-expiry" style="font-size:0.78rem;color:#555;">${l.expiresAt || '—'}</td>
          <td class="col-usage" style="font-size:0.78rem;font-weight:${usageThis > 0 ? '600' : 'normal'};color:${usageThis > 0 ? '#000' : '#aaa'};">${usageThis}</td>
          <td class="col-usage" style="font-size:0.78rem;color:#aaa;">${usageLast}</td>
          <td class="col-status"><span class="badge bg-${statusBadge[st]}" style="font-size:0.65rem;">${statusLabel[st]}</span></td>
          <td class="col-action pe-3">
            ${!isStripe && !l.upgradedAt ? `<button class="btn btn-outline-warning btn-sm py-0 px-1 me-1 btn-upgrade" data-key="${esc(l.key)}" title="有料転換としてマーク"><i class="bi bi-arrow-up-circle"></i></button>` : ''}
            <button class="btn btn-outline-danger btn-sm py-0 px-1 btn-delete" data-key="${esc(l.key)}" title="削除"><i class="bi bi-trash"></i></button>
          </td>
        </tr>`;
      }).join('');

      tbody.querySelectorAll('.btn-upgrade').forEach(btn => {
        btn.addEventListener('click', () => upgradeLicense(btn.dataset.key));
      });
      tbody.querySelectorAll('.btn-delete').forEach(btn => {
        btn.addEventListener('click', () => deleteLicense(btn.dataset.key));
      });

      document.getElementById('noResult').classList.toggle('d-none', filtered.length > 0);
    }

    function exportCsv() {
      const header = ['発行日','氏名','ビジネス名','メール','ライセンスキー','プラン','有効期限','今月申請数','先月申請数','ステータス'];
      const statusLabel = { active: '有効', expired: '期限切れ', suspended: '停止中' };
      const planLabel   = { solo: 'ソロ', team: 'チーム', standard: '標準' };
      const rows = _all.map(l => [
        l.createdAt?.split('T')[0] || '',
        l.customerName || l.company || '', l.businessName || '', l.email || '',
        l.key, planLabel[l.plan] || l.plan || '', l.expiresAt || '',
        l.usageThis ?? '', l.usageLast ?? '', statusLabel[getStatus(l)]
      ]);
      const csv = [header, ...rows].map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' }));
      a.download = `licenses_${new Date().toISOString().split('T')[0]}.csv`;
      a.click();
    }

    async function upgradeLicense(key) {
      if (!confirm(`有料転換としてマークしますか？\n${key}\n\n有効期限が1年延長されます（Stripe外の決済用）。`)) return;
      const resp = await fetch(`/api/admin-licenses?secret=${encodeURIComponent(_secret)}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ key, action: 'upgrade' }),
      });
      if (!resp.ok) { alert('処理に失敗しました'); return; }
      const data = await resp.json();
      const idx = _all.findIndex(l => l.key === key);
      if (idx !== -1) _all[idx] = { ..._all[idx], ...data };
      updateStats();
      updateMonthly();
      render();
    }

    async function deleteLicense(key) {
      if (!confirm(`削除しますか？\n${key}\n\nこの操作は取り消せません。`)) return;
      const resp = await fetch(`/api/admin-licenses?secret=${encodeURIComponent(_secret)}&key=${encodeURIComponent(key)}`, { method: 'DELETE' });
      if (!resp.ok) { alert('削除に失敗しました'); return; }
      _all = _all.filter(l => l.key !== key);
      updateStats();
      render();
    }

    function esc(s) {
      return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
  </script>
</body>
</html>
