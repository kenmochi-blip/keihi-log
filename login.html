<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>経費ログ｜AI領収書解析・経費申請システム</title>
  <meta name="description" content="経費ログは、AI領収書解析・経費申請・承認・集計をブラウザで完結できる経費管理Webアプリです。Googleアカウントで簡単にログインしてご利用いただけます。">
  <meta name="google-site-verification" content="s1kOFLpIzqB1-Bg6R8GtUB52Q3SieZdI_XBtbBBsN4s">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0d6efd">
</head>
<body class="bg-light">

  <div class="min-vh-100 d-flex align-items-center justify-content-center bg-light">
    <div style="width:100%;max-width:360px;padding:1.5rem;">

      <!-- ロゴ -->
      <div class="text-center mb-4">
        <img src="/icons/icon-192.png" width="72" height="72" style="border-radius:18px;" alt="経費ログ">
        <h1 class="h4 fw-bold mt-2 mb-0">経費ログ</h1>
      </div>

      <!-- ログインカード -->
      <div class="card shadow-sm border-0">
        <div class="card-body p-4">
          <div id="loginArea">
            <p class="text-muted small text-center mb-3">Googleアカウントでログインしてください</p>
            <button id="signInBtn" class="btn btn-outline-primary w-100">
              <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" class="me-2">Googleでログイン
            </button>
            <div id="loginError" class="alert alert-danger small mt-2 d-none"></div>
          </div>
          <div id="loadingArea" class="d-none text-center py-2">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="text-muted small mt-2 mb-0">認証中...</p>
          </div>
        </div>
      </div>

      <!-- フッター -->
      <div class="text-center text-muted mt-4" style="font-size:0.72rem;">
        <a href="/privacy" class="text-muted">プライバシーポリシー</a>
        <span class="mx-1">｜</span>
        <a href="mailto:support@keihi-log.com" class="text-muted">お問い合わせ</a>
      </div>

    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script>document.addEventListener('DOMContentLoaded', initLogin);</script>
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js', { scope: '/app.html' }).catch(() => {});</script>
</body>
</html>
