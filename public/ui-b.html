<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>UI案B（ウィザード）｜経費ログ</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <meta name="theme-color" content="#0d6efd">
  <style>
    /* ─── Pattern B: 段階的ウィザード ─── */

    /* ウィザードカード共通 */
    .wiz-card {
      border-radius: 14px;
      margin-bottom: 10px;
      overflow: hidden;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    /* ロック状態（回答待ち） */
    .wiz-card.locked {
      background: #f8f9fa;
      border: 1.5px dashed #ced4da;
      padding: 12px 16px;
      opacity: 0.55;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #6c757d;
      font-size: 0.82rem;
    }

    /* アクティブ（現在の質問） */
    .wiz-card.active {
      background: #fff;
      box-shadow: 0 2px 10px rgba(13,110,253,0.12);
      border: 1.5px solid #90beff;
      padding: 16px;
      animation: slideIn 0.22s ease-out both;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* 回答済み（コンパクト） */
    .wiz-card.answered {
      background: #f0f7ff;
      border: 1.5px solid #c0d8f8;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ステップ番号バッジ */
    .step-badge {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #0d6efd;
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .wiz-card.locked .step-badge { background: #adb5bd; }
    .wiz-card.answered .step-badge { background: #198754; }

    /* 質問テキスト */
    .step-q {
      font-size: 0.9rem;
      font-weight: 700;
      color: #212529;
      margin-bottom: 12px;
    }

    /* 選択肢ボタングリッド */
    .choice-grid {
      display: grid;
      gap: 8px;
    }
    .choice-grid.cols-2 { grid-template-columns: 1fr 1fr; }
    .choice-grid.cols-4 { grid-template-columns: repeat(4, 1fr); }

    @media (max-width: 360px) {
      .choice-grid.cols-4 { grid-template-columns: repeat(2, 1fr); }
    }

    .choice-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 14px 8px;
      border: 2px solid #dee2e6;
      border-radius: 12px;
      background: #fff;
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 600;
      color: #495057;
      gap: 6px;
      touch-action: manipulation;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
    }
    .choice-btn i { font-size: 1.5rem; color: #6c757d; }
    .choice-btn:hover { border-color: #0d6efd; color: #0d6efd; }
    .choice-btn:hover i { color: #0d6efd; }
    .choice-btn.selected {
      background: #0d6efd;
      border-color: #0d6efd;
      color: #fff;
    }
    .choice-btn.selected i { color: #fff; }

    /* 選択肢が2択の場合は横並び大ボタン */
    .choice-grid.cols-2 .choice-btn {
      flex-direction: row;
      padding: 14px 16px;
      font-size: 0.88rem;
      gap: 10px;
    }
    .choice-grid.cols-2 .choice-btn i { font-size: 1.3rem; }

    /* 回答済みの表示 */
    .answered-label {
      font-size: 0.78rem;
      color: #495057;
      flex: 1;
    }
    .answered-value {
      font-size: 0.78rem;
      font-weight: 700;
      color: #0d6efd;
      background: #e8f0fe;
      border-radius: 20px;
      padding: 2px 10px;
    }
    .btn-redo {
      font-size: 0.7rem;
      color: #6c757d;
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 4px;
      touch-action: manipulation;
    }
    .btn-redo:hover { color: #0d6efd; }

    /* フォームエリア（ステップ完了後に出現） */
    .form-area {
      animation: slideIn 0.25s ease-out both;
    }

    /* 比較バナー */
    .compare-bar {
      background: #fff3cd;
      border-bottom: 1px solid #ffc107;
      font-size: 0.78rem;
      padding: 6px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
  </style>
</head>
<body class="bg-light">

  <!-- ヘッダー -->
  <nav class="navbar navbar-dark bg-primary sticky-top px-3 py-2">
    <span class="navbar-brand fw-bold fs-6">
      <i class="bi bi-receipt me-1"></i>経費ログ
      <span class="badge bg-success text-white ms-2" style="font-size:0.6rem;">UI案B プレビュー</span>
    </span>
    <a href="/app" class="btn btn-outline-light btn-sm">通常版</a>
  </nav>

  <!-- 比較バナー -->
  <div class="compare-bar">
    <i class="bi bi-chat-square-dots text-warning"></i>
    <span>案B：質問に答えながら入力フォームが順次解放されるウィザード型</span>
    <a href="/ui-a" class="ms-auto btn btn-sm btn-outline-secondary py-0">案Aを見る →</a>
  </div>

  <div class="container-fluid" style="max-width:480px; padding-bottom:80px;">
    <div class="pt-3">

      <!-- ──── STEP 1: 立替確認 ──── -->
      <div class="wiz-card active" id="step1Card">
        <div class="d-flex align-items-center gap-2 mb-3">
          <span class="step-badge">1</span>
          <span class="step-q mb-0">自分で立て替えましたか？</span>
        </div>
        <div class="choice-grid cols-2">
          <button class="choice-btn" id="btn-self" onclick="selectPayer('self')">
            <i class="bi bi-person-fill"></i>
            はい、立替えた
          </button>
          <button class="choice-btn" id="btn-company" onclick="selectPayer('company')">
            <i class="bi bi-building"></i>
            会社払い
          </button>
        </div>
      </div>

      <!-- ──── STEP 2: 証票種類 ──── -->
      <div class="wiz-card locked" id="step2Card">
        <span class="step-badge">2</span>
        <span>証票の種類は？</span>
        <i class="bi bi-lock ms-auto" style="font-size:0.85rem;"></i>
      </div>

      <!-- ──── STEP 3 (フォームエリア) ──── -->
      <div class="wiz-card locked" id="step3Card">
        <span class="step-badge">3</span>
        <span>内容を入力</span>
        <i class="bi bi-lock ms-auto" style="font-size:0.85rem;"></i>
      </div>

    </div>
  </div>

  <!-- ボトムナビ（見た目のみ） -->
  <nav class="fixed-bottom bg-white border-top py-1">
    <div class="d-flex justify-content-around">
      <button class="nav-item-btn active d-flex flex-column align-items-center gap-1 border-0 bg-transparent">
        <i class="bi bi-plus-circle-fill" style="font-size:1.4rem;"></i>
        <span style="font-size:0.7rem;">登録</span>
      </button>
      <button class="nav-item-btn d-flex flex-column align-items-center gap-1 border-0 bg-transparent">
        <i class="bi bi-list-ul" style="font-size:1.4rem;"></i>
        <span style="font-size:0.7rem;">一覧</span>
      </button>
      <button class="nav-item-btn d-flex flex-column align-items-center gap-1 border-0 bg-transparent">
        <i class="bi bi-bar-chart-fill" style="font-size:1.4rem;"></i>
        <span style="font-size:0.7rem;">集計</span>
      </button>
      <button class="nav-item-btn d-flex flex-column align-items-center gap-1 border-0 bg-transparent">
        <i class="bi bi-gear-fill" style="font-size:1.4rem;"></i>
        <span style="font-size:0.7rem;">設定</span>
      </button>
    </div>
  </nav>

  <script>
    const state = { payer: null, receiptType: null };

    const PAYER_LABELS = { self: 'はい、立替えた', company: '会社払い' };
    const TYPE_LABELS  = {
      receipt: 'レシート/領収書',
      nashi:   '領収書なし',
      transit: '電車/バス',
      car:     '自家用車',
    };

    // ─── Step 1 選択 ───
    function selectPayer(val) {
      state.payer = val;

      // Step 1 → 回答済み表示
      const c1 = document.getElementById('step1Card');
      c1.className = 'wiz-card answered';
      c1.innerHTML = `
        <span class="step-badge">1</span>
        <span class="answered-label">自分で立て替えましたか？</span>
        <span class="answered-value">${PAYER_LABELS[val]}</span>
        <button class="btn-redo" onclick="resetStep(1)"><i class="bi bi-pencil"></i></button>`;

      // Step 2 解放
      showStep2();
    }

    // ─── Step 2 表示 ───
    function showStep2() {
      const c2 = document.getElementById('step2Card');
      c2.className = 'wiz-card active';
      c2.innerHTML = `
        <div class="d-flex align-items-center gap-2 mb-3">
          <span class="step-badge">2</span>
          <span class="step-q mb-0">証票の種類は？</span>
        </div>
        <div class="choice-grid cols-4">
          <button class="choice-btn" onclick="selectType('receipt')">
            <i class="bi bi-camera-fill"></i>
            <span>レシート/<br>領収書</span>
          </button>
          <button class="choice-btn" onclick="selectType('nashi')">
            <i class="bi bi-pencil-square"></i>
            <span>領収書<br>なし</span>
          </button>
          <button class="choice-btn" onclick="selectType('transit')">
            <i class="bi bi-train-front-fill"></i>
            <span>電車/<br>バス</span>
          </button>
          <button class="choice-btn" onclick="selectType('car')">
            <i class="bi bi-car-front-fill"></i>
            <span>自家用車</span>
          </button>
        </div>`;
      c2.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // ─── Step 2 選択 ───
    function selectType(val) {
      state.receiptType = val;

      // Step 2 → 回答済み
      const c2 = document.getElementById('step2Card');
      c2.className = 'wiz-card answered';
      c2.innerHTML = `
        <span class="step-badge">2</span>
        <span class="answered-label">証票の種類は？</span>
        <span class="answered-value">${TYPE_LABELS[val]}</span>
        <button class="btn-redo" onclick="resetStep(2)"><i class="bi bi-pencil"></i></button>`;

      // Step 3 解放（フォーム）
      showStep3(val);
    }

    // ─── Step 3 表示（種類に応じたフォーム） ───
    function showStep3(type) {
      const c3 = document.getElementById('step3Card');
      c3.className = 'wiz-card active';

      const typeIcon = {
        receipt: 'bi-camera-fill', nashi: 'bi-pencil-square',
        transit: 'bi-train-front-fill', car: 'bi-car-front-fill',
      }[type];

      let formHtml = '';

      if (type === 'receipt') {
        formHtml = `
          <div class="receipt-upload-card mb-3">
            <div class="upload-grid mb-2">
              <button class="upload-card"><i class="bi bi-camera-fill"></i>カメラ</button>
              <button class="upload-card"><i class="bi bi-folder-fill"></i>ファイル</button>
            </div>
            <button class="btn btn-primary w-100"><i class="bi bi-stars me-2"></i>AIで読み取る</button>
          </div>
          ${commonFields()}
          ${amountField()}`;

      } else if (type === 'nashi') {
        formHtml = `
          ${commonFields()}
          ${amountField()}
          <div class="mb-2">
            <label class="form-label small fw-semibold">領収書がない理由 <span class="text-danger">*</span></label>
            <textarea class="form-control form-control-sm" rows="3" placeholder="具体的な理由を記入してください"></textarea>
          </div>`;

      } else if (type === 'transit') {
        formHtml = `
          ${dateField()}
          <div class="row g-2 mb-2">
            <div class="col-6">
              <label class="form-label small fw-semibold">出発駅・バス停</label>
              <input type="text" class="form-control form-control-sm">
            </div>
            <div class="col-6">
              <label class="form-label small fw-semibold">到着駅・バス停</label>
              <input type="text" class="form-control form-control-sm">
            </div>
          </div>
          <div class="row g-2 mb-2">
            <div class="col-6">
              <label class="form-label small fw-semibold">片道運賃（円）</label>
              <input type="text" inputmode="numeric" class="form-control form-control-sm" placeholder="0">
            </div>
            <div class="col-6 d-flex align-items-end pb-1">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="chkRound">
                <label class="form-check-label small" for="chkRound">往復</label>
              </div>
            </div>
          </div>
          <div class="mb-2">
            <label class="form-label small fw-semibold">勘定科目</label>
            <select class="form-select form-select-sm"><option>旅費交通費</option></select>
          </div>`;

      } else if (type === 'car') {
        formHtml = `
          ${dateField()}
          <div class="mb-2">
            <label class="form-label small fw-semibold">案件・経路名</label>
            <input type="text" class="form-control form-control-sm" placeholder="例：〇〇社訪問 東京→横浜">
          </div>
          <div class="row g-2 mb-2">
            <div class="col-6">
              <label class="form-label small fw-semibold">距離（km）</label>
              <input type="number" class="form-control form-control-sm">
            </div>
            <div class="col-6">
              <label class="form-label small fw-semibold">レート（円/km）</label>
              <input type="number" class="form-control form-control-sm" value="20">
            </div>
          </div>
          <div class="mb-2">
            <label class="form-label small fw-semibold">勘定科目</label>
            <select class="form-select form-select-sm"><option>旅費交通費</option></select>
          </div>`;
      }

      // 会社払いの場合は支払元セレクトを追加
      const corpPayExtra = state.payer === 'company' ? `
        <div class="mb-2">
          <label class="form-label small fw-semibold">支払元</label>
          <select class="form-select form-select-sm">
            <option>法人カード（〇〇）</option>
            <option>法人口座</option>
          </select>
        </div>` : '';

      c3.innerHTML = `
        <div class="d-flex align-items-center gap-2 mb-3">
          <span class="step-badge">3</span>
          <span class="step-q mb-0"><i class="bi ${typeIcon} me-1"></i>内容を入力</span>
        </div>
        <div class="form-area">
          ${corpPayExtra}
          ${formHtml}
          <div class="mb-2">
            <label class="form-label small fw-semibold">備考</label>
            <textarea class="form-control form-control-sm" rows="2"></textarea>
          </div>
          <div class="d-grid mt-3">
            <button class="btn btn-primary btn-lg rounded-3">
              <i class="bi bi-send me-2"></i>登録する
            </button>
          </div>
        </div>`;
      c3.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // ─── やり直し ───
    function resetStep(step) {
      if (step <= 1) {
        state.payer = null;
        state.receiptType = null;

        // Step 1 を active に戻す
        const c1 = document.getElementById('step1Card');
        c1.className = 'wiz-card active';
        c1.innerHTML = `
          <div class="d-flex align-items-center gap-2 mb-3">
            <span class="step-badge">1</span>
            <span class="step-q mb-0">自分で立て替えましたか？</span>
          </div>
          <div class="choice-grid cols-2">
            <button class="choice-btn" id="btn-self" onclick="selectPayer('self')">
              <i class="bi bi-person-fill"></i>はい、立替えた
            </button>
            <button class="choice-btn" id="btn-company" onclick="selectPayer('company')">
              <i class="bi bi-building"></i>会社払い
            </button>
          </div>`;

        // Step 2, 3 を再ロック
        lockStep('step2Card', 2, '証票の種類は？');
        lockStep('step3Card', 3, '内容を入力');

      } else if (step <= 2) {
        state.receiptType = null;
        showStep2();
        lockStep('step3Card', 3, '内容を入力');
      }
    }

    function lockStep(id, num, label) {
      const el = document.getElementById(id);
      el.className = 'wiz-card locked';
      el.innerHTML = `
        <span class="step-badge">${num}</span>
        <span>${label}</span>
        <i class="bi bi-lock ms-auto" style="font-size:0.85rem;"></i>`;
    }

    // ─── フォームパーツ ───
    function dateField() {
      const today = new Date().toISOString().split('T')[0];
      return `<div class="mb-2">
        <label class="form-label small fw-semibold">日付 <span class="text-danger">*</span></label>
        <input type="date" class="form-control form-control-sm" value="${today}">
      </div>`;
    }
    function commonFields() {
      return dateField() + `
        <div class="mb-2">
          <label class="form-label small fw-semibold">支払先 <span class="text-danger">*</span></label>
          <input type="text" class="form-control form-control-sm" placeholder="店名・会社名">
        </div>`;
    }
    function amountField() {
      return `<div class="mb-2">
        <label class="form-label small fw-semibold">金額・勘定科目 <span class="text-danger">*</span></label>
        <div class="row g-2">
          <div class="col-5">
            <input type="text" inputmode="numeric" class="form-control form-control-sm" placeholder="金額（円）">
          </div>
          <div class="col-7">
            <select class="form-select form-select-sm">
              <option>交際費</option><option>消耗品費</option>
              <option>旅費交通費</option><option>会議費</option>
            </select>
          </div>
        </div>
      </div>`;
    }
  </script>
</body>
</html>
