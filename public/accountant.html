<!DOCTYPE html>
<html lang="ja">
<head>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-XCNC24BTGP"></script>
<script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>会計事務所ダッシュボード｜経費ログ</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <style>
    /* 顧問先名列を左固定 */
    .pivot-name-col {
      position: sticky;
      left: 0;
      z-index: 2;
      min-width: 170px;
      max-width: 200px;
      width: 170px;
      background: #fff;
      box-shadow: 2px 0 6px rgba(0,0,0,.06);
    }
    thead .pivot-name-col {
      background: #f8f9fa;
      z-index: 3;
    }
    .cat-row .pivot-name-col { background: #f9fafb; }

    .pivot-cell { cursor: pointer; transition: background .1s; }
    .pivot-cell:hover { background: #e9f0ff !important; }
    .pivot-cell .amount { font-weight: 600; }
    .pivot-cell .cnt { font-size: .72rem; color: #999; }

    .cat-row td { font-size: .82rem; color: #555; background: #f9fafb; }

    .expand-btn { white-space: nowrap; }
    .expand-icon { transition: transform .15s; display: inline-block; }
    .expand-icon.open { transform: rotate(180deg); }

    .company-name { cursor: pointer; color: inherit; }
    .company-name:hover { text-decoration: underline; }

    /* 勘定科目セルのホバー詳細ツールチップ */
    .cat-detail-tip {
      position: fixed;
      background: rgba(33,37,41,.93);
      color: #fff;
      padding: .35rem .6rem;
      border-radius: .375rem;
      font-size: .78rem;
      pointer-events: none;
      z-index: 9999;
      min-width: 160px;
      max-width: 260px;
      box-shadow: 0 2px 10px rgba(0,0,0,.25);
      line-height: 1.7;
    }
    .cat-amount-cell { cursor: default; }
    .cat-amount-cell.has-tip { cursor: help; }

    .receipt-link { font-size: .8rem; }
    .cat-bar { height: 8px; border-radius: 4px; }
  </style>
</head>
<body class="bg-light">

  <!-- Auth Gate -->
  <div id="authGate" class="min-vh-100 d-flex align-items-center justify-content-center">
    <div style="width:100%;max-width:380px;padding:1.5rem;">
      <div class="text-center mb-4">
        <img src="/icons/icon-192.png" width="72" height="72" style="border-radius:18px;" alt="経費ログ">
        <h1 class="h5 fw-bold mt-2 mb-1">会計事務所ダッシュボード</h1>
        <p class="text-muted small mb-0">経費ログ</p>
      </div>
      <div class="card shadow-sm border-0">
        <div class="card-body p-4">
          <div id="loginArea">
            <p class="text-muted small text-center mb-3">顧問先の経費・証票を確認できます</p>
            <button id="signInBtn" class="btn btn-outline-primary w-100">
              <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" class="me-2" alt="">Googleでログイン
            </button>
            <div id="authError" class="alert alert-danger small mt-2 d-none"></div>
          </div>
          <div id="loadingAuth" class="d-none text-center py-3">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="text-muted small mt-2 mb-0">認証中...</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Main Dashboard -->
  <div id="mainContent" class="d-none">

    <nav class="navbar navbar-dark bg-primary sticky-top">
      <div class="container-fluid">
        <span class="navbar-brand d-flex align-items-center gap-2 mb-0 h6">
          <img src="/icons/icon-nav.svg" width="26" height="26" alt="">
          経費ログ
          <span class="badge bg-white text-primary fw-normal" style="font-size:.6rem;">会計事務所</span>
        </span>
        <div class="d-flex align-items-center gap-2">
          <small id="userEmailDisplay" class="text-white-50 d-none d-md-inline"></small>
          <button id="logoutBtn" class="btn btn-outline-light btn-sm">ログアウト</button>
        </div>
      </div>
    </nav>

    <div class="container-fluid py-3 px-3 px-md-4" style="max-width:1400px;">

      <!-- Header -->
      <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-3">
        <div>
          <h2 class="h5 fw-bold mb-0">ダッシュボード</h2>
          <small class="text-muted" id="referrerLabel"></small>
        </div>
        <div class="d-flex align-items-center gap-2 flex-wrap">
          <div class="btn-group btn-group-sm" id="monthCountGroup" role="group" aria-label="表示期間">
            <button type="button" class="btn btn-outline-secondary" data-months="3">3ヶ月</button>
            <button type="button" class="btn btn-outline-secondary active" data-months="6">6ヶ月</button>
            <button type="button" class="btn btn-outline-secondary" data-months="12">12ヶ月</button>
          </div>
          <button id="refreshBtn" class="btn btn-outline-secondary btn-sm" title="再読み込み">
            <i class="bi bi-arrow-clockwise"></i>
          </button>
        </div>
      </div>

      <!-- Loading -->
      <div id="loadingClients" class="text-center py-5 d-none">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="text-muted small mt-2">顧問先データを取得中...</p>
      </div>

      <!-- Error/empty state -->
      <div id="errorState" class="d-none"></div>

      <!-- Pivot table -->
      <div id="pivotContainer"></div>

    </div>
  </div>

  <!-- Detail Modal -->
  <div class="modal fade" id="detailModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-xl">
      <div class="modal-content">
        <div class="modal-header pb-2">
          <div>
            <h5 class="modal-title mb-0" id="detailTitle">—</h5>
            <small class="text-muted" id="detailMonth"></small>
          </div>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body p-0">
          <ul class="nav nav-tabs px-3 pt-2">
            <li class="nav-item">
              <a class="nav-link active" data-bs-toggle="tab" href="#tabExpenses">経費一覧</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" data-bs-toggle="tab" href="#tabCategories">勘定科目別</a>
            </li>
          </ul>
          <div class="tab-content">
            <div class="tab-pane fade show active p-3" id="tabExpenses">
              <div class="d-flex justify-content-end mb-2">
                <button id="csvExportBtn" class="btn btn-outline-secondary btn-sm">
                  <i class="bi bi-download me-1"></i>CSV出力
                </button>
              </div>
              <div class="table-responsive">
                <table class="table table-sm table-hover align-middle" style="font-size:.85rem;">
                  <thead class="table-light">
                    <tr>
                      <th class="text-nowrap">日付</th>
                      <th>申請者</th>
                      <th>支払先</th>
                      <th class="text-end">金額</th>
                      <th>勘定科目</th>
                      <th>備考</th>
                      <th>状態</th>
                      <th>証票</th>
                    </tr>
                  </thead>
                  <tbody id="detailTableBody"></tbody>
                </table>
              </div>
            </div>
            <div class="tab-pane fade p-3" id="tabCategories">
              <div id="categoryBreakdown"></div>
            </div>
          </div>
        </div>
        <div class="modal-footer py-2">
          <small class="text-muted me-auto" id="detailSummaryText"></small>
          <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">閉じる</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/accountant.js"></script>
</body>
</html>
