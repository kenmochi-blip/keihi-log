<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>UI案A（横一列タイル）｜経費ログ</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <meta name="theme-color" content="#0d6efd">
  <style>
    /* ─── Pattern A: 横一列タイル ─── */
    .type-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-bottom: 12px;
    }
    .type-card-a {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px 4px;
      border: 2px solid #dee2e6;
      border-radius: 10px;
      background: #fff;
      cursor: pointer;
      font-size: 0.7rem;
      font-weight: 600;
      color: #6c757d;
      gap: 5px;
      line-height: 1.2;
      text-align: center;
      touch-action: manipulation;
      transition: background-color 0.12s, border-color 0.12s, color 0.12s;
    }
    .type-card-a i { font-size: 1.35rem; }
    .type-card-a.active {
      background: #0d6efd;
      border-color: #0d6efd;
      color: #fff;
    }
    .type-card-a.active i { color: #fff; }

    /* 横幅節約のため表示名を2行に分けない工夫 */
    .type-card-a .card-label { white-space: pre-line; }

    /* 比較バナー */
    .compare-bar {
      background: #fff3cd;
      border-bottom: 1px solid #ffc107;
      font-size: 0.78rem;
      padding: 6px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* 高さ節約を可視化するためにセパレータを表示 */
    .compact-indicator {
      background: #e8f4fd;
      border: 1px dashed #90caf9;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 0.72rem;
      color: #1565c0;
      text-align: center;
      margin-bottom: 10px;
    }
  </style>
</head>
<body class="bg-light">

  <!-- ヘッダー -->
  <nav class="navbar navbar-dark bg-primary sticky-top px-3 py-2">
    <span class="navbar-brand fw-bold fs-6">
      <i class="bi bi-receipt me-1"></i>経費ログ
      <span class="badge bg-warning text-dark ms-2" style="font-size:0.6rem;">UI案A プレビュー</span>
    </span>
    <a href="/app" class="btn btn-outline-light btn-sm">通常版</a>
  </nav>

  <!-- 比較バナー -->
  <div class="compare-bar">
    <i class="bi bi-layout-three-columns text-warning"></i>
    <span>案A：4つのタイルを横一列に配置（縦スペースを大幅削減）</span>
    <a href="/ui-b" class="ms-auto btn btn-sm btn-outline-secondary py-0">案Bを見る →</a>
  </div>

  <div class="container-fluid" style="max-width:480px; padding-bottom:80px;">
    <div class="pt-3">

      <!-- 横一列タイル -->
      <div class="type-row" id="typeRow">
        <button class="type-card-a active" data-type="receipt">
          <i class="bi bi-camera-fill"></i>
          <span class="card-label">レシート/\n領収書</span>
        </button>
        <button class="type-card-a" data-type="nashi">
          <i class="bi bi-pencil-square"></i>
          <span class="card-label">領収書\nなし</span>
        </button>
        <button class="type-card-a" data-type="transit">
          <i class="bi bi-train-front-fill"></i>
          <span class="card-label">電車/\nバス</span>
        </button>
        <button class="type-card-a" data-type="car">
          <i class="bi bi-car-front-fill"></i>
          <span class="card-label">自家用車</span>
        </button>
      </div>

      <div class="compact-indicator">
        <i class="bi bi-arrows-collapse me-1"></i>通常版より <strong>約60px</strong> 縦スペースを節約
      </div>

      <!-- 会社払いトグル -->
      <div class="card mb-3 border-0 shadow-sm">
        <div class="card-body py-2">
          <div class="form-check form-switch d-flex align-items-center gap-2 mb-0">
            <input class="form-check-input" type="checkbox" id="chkCorpPay" style="width:2.5rem;height:1.3rem;">
            <label class="form-check-label fw-semibold" for="chkCorpPay">会社払い（立替精算なし）</label>
          </div>
        </div>
      </div>

      <!-- ──── パネル：レシート/領収書 ──── -->
      <div id="panel-receipt">
        <div class="receipt-upload-card mb-3">
          <div class="upload-grid mb-2">
            <button class="upload-card">
              <i class="bi bi-camera-fill"></i>カメラ
            </button>
            <button class="upload-card">
              <i class="bi bi-folder-fill"></i>ファイル
            </button>
          </div>
          <button class="btn btn-primary w-100">
            <i class="bi bi-stars me-2"></i>AIで読み取る
          </button>
        </div>
        <div class="mb-2">
          <label class="form-label small fw-semibold">日付 <span class="text-danger">*</span></label>
          <input type="date" class="form-control form-control-sm">
        </div>
        <div class="mb-2">
          <label class="form-label small fw-semibold">支払先 <span class="text-danger">*</span></label>
          <input type="text" class="form-control form-control-sm" placeholder="店名・会社名">
        </div>
        <div class="mb-2">
          <label class="form-label small fw-semibold">金額・勘定科目 <span class="text-danger">*</span></label>
          <div class="row g-2">
            <div class="col-5">
              <input type="text" inputmode="numeric" class="form-control form-control-sm" placeholder="金額（円）">
            </div>
            <div class="col-7">
              <select class="form-select form-select-sm">
                <option>交際費</option><option>消耗品費</option><option>旅費交通費</option>
                <option>会議費</option><option>通信費</option>
              </select>
            </div>
          </div>
        </div>
        <div class="mb-2">
          <label class="form-label small fw-semibold">備考</label>
          <textarea class="form-control form-control-sm" rows="2"></textarea>
        </div>
      </div>

      <!-- ──── パネル：領収書なし ──── -->
      <div id="panel-nashi" class="d-none">
        <div class="mb-2">
          <label class="form-label small fw-semibold">日付 <span class="text-danger">*</span></label>
          <input type="date" class="form-control form-control-sm">
        </div>
        <div class="mb-2">
          <label class="form-label small fw-semibold">支払先・目的 <span class="text-danger">*</span></label>
          <input type="text" class="form-control form-control-sm">
        </div>
        <div class="row g-2 mb-2">
          <div class="col-5">
            <input type="text" inputmode="numeric" class="form-control form-control-sm" placeholder="金額（円）">
          </div>
          <div class="col-7">
            <select class="form-select form-select-sm">
              <option>交際費</option><option>消耗品費</option><option>旅費交通費</option>
            </select>
          </div>
        </div>
        <div class="mb-2">
          <label class="form-label small fw-semibold">理由・詳細 <span class="text-danger">*</span></label>
          <textarea class="form-control form-control-sm" rows="3"></textarea>
        </div>
      </div>

      <!-- ──── パネル：電車/バス ──── -->
      <div id="panel-transit" class="d-none">
        <div class="mb-2">
          <label class="form-label small fw-semibold">日付 <span class="text-danger">*</span></label>
          <input type="date" class="form-control form-control-sm">
        </div>
        <div class="row g-2 mb-2">
          <div class="col-6">
            <label class="form-label small fw-semibold">出発駅・バス停</label>
            <input type="text" class="form-control form-control-sm">
          </div>
          <div class="col-6">
            <label class="form-label small fw-semibold">到着駅・バス停</label>
            <input type="text" class="form-control form-control-sm">
          </div>
        </div>
        <div class="row g-2 mb-2">
          <div class="col-6">
            <label class="form-label small fw-semibold">片道運賃（円）</label>
            <input type="text" inputmode="numeric" class="form-control form-control-sm" placeholder="0">
          </div>
          <div class="col-6 d-flex align-items-end pb-1">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="chkRound">
              <label class="form-check-label small" for="chkRound">往復</label>
            </div>
          </div>
        </div>
        <div class="mb-2">
          <label class="form-label small fw-semibold">勘定科目</label>
          <select class="form-select form-select-sm">
            <option>旅費交通費</option>
          </select>
        </div>
      </div>

      <!-- ──── パネル：自家用車 ──── -->
      <div id="panel-car" class="d-none">
        <div class="mb-2">
          <label class="form-label small fw-semibold">日付 <span class="text-danger">*</span></label>
          <input type="date" class="form-control form-control-sm">
        </div>
        <div class="mb-2">
          <label class="form-label small fw-semibold">案件・経路名</label>
          <input type="text" class="form-control form-control-sm" placeholder="例：〇〇社訪問 東京→横浜">
        </div>
        <div class="row g-2 mb-2">
          <div class="col-6">
            <label class="form-label small fw-semibold">距離（km）</label>
            <input type="number" class="form-control form-control-sm">
          </div>
          <div class="col-6">
            <label class="form-label small fw-semibold">レート（円/km）</label>
            <input type="number" class="form-control form-control-sm" value="20">
          </div>
        </div>
        <div class="mb-2">
          <label class="form-label small fw-semibold">勘定科目</label>
          <select class="form-select form-select-sm"><option>旅費交通費</option></select>
        </div>
      </div>

      <!-- 申請ボタン -->
      <div class="d-grid mt-3 mb-4">
        <button class="btn btn-primary btn-lg rounded-3">
          <i class="bi bi-send me-2"></i>登録する
        </button>
      </div>

    </div>
  </div>

  <!-- ボトムナビ（見た目のみ） -->
  <nav class="fixed-bottom bg-white border-top py-1">
    <div class="d-flex justify-content-around">
      <button class="nav-item-btn active d-flex flex-column align-items-center gap-1 border-0 bg-transparent">
        <i class="bi bi-plus-circle-fill" style="font-size:1.4rem;"></i>
        <span style="font-size:0.7rem;">登録</span>
      </button>
      <button class="nav-item-btn d-flex flex-column align-items-center gap-1 border-0 bg-transparent">
        <i class="bi bi-list-ul" style="font-size:1.4rem;"></i>
        <span style="font-size:0.7rem;">一覧</span>
      </button>
      <button class="nav-item-btn d-flex flex-column align-items-center gap-1 border-0 bg-transparent">
        <i class="bi bi-bar-chart-fill" style="font-size:1.4rem;"></i>
        <span style="font-size:0.7rem;">集計</span>
      </button>
      <button class="nav-item-btn d-flex flex-column align-items-center gap-1 border-0 bg-transparent">
        <i class="bi bi-gear-fill" style="font-size:1.4rem;"></i>
        <span style="font-size:0.7rem;">設定</span>
      </button>
    </div>
  </nav>

  <script>
    const PANELS = { receipt: 'panel-receipt', nashi: 'panel-nashi', transit: 'panel-transit', car: 'panel-car' };
    let current = 'receipt';

    document.querySelectorAll('.type-card-a').forEach(btn => {
      btn.addEventListener('click', () => {
        current = btn.dataset.type;
        document.querySelectorAll('.type-card-a').forEach(b => b.classList.toggle('active', b === btn));
        Object.values(PANELS).forEach(id => document.getElementById(id).classList.add('d-none'));
        document.getElementById(PANELS[current]).classList.remove('d-none');
      });
    });
  </script>
</body>
</html>
