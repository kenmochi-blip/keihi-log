<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>セットアップガイド デバッグ一覧</title>
  <style>
    body { font-family: sans-serif; background: #1a1a2e; color: #eee; margin: 0; padding: 16px; }
    h1 { font-size: 1.2rem; margin-bottom: 16px; color: #adf; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
    .card { background: #2a2a40; border-radius: 8px; overflow: hidden; }
    .card-label { padding: 6px 10px; font-size: 0.85rem; font-weight: bold; color: #ffd; background: #333355; }
    .card img { width: 100%; display: block; }
  </style>
</head>
<body>
  <h1>セットアップガイド 画像デバッグ一覧</h1>
  <div class="grid">
    <div class="card"><div class="card-label">step01.png</div><img src="/img/setup-guide/step01.png"></div>
    <div class="card"><div class="card-label">step02.png</div><img src="/img/setup-guide/step02.png"></div>
    <div class="card"><div class="card-label">step03.png</div><img src="/img/setup-guide/step03.png"></div>
    <div class="card"><div class="card-label">step04.png</div><img src="/img/setup-guide/step04.png"></div>
    <div class="card"><div class="card-label">step05.png</div><img src="/img/setup-guide/step05.png"></div>
    <div class="card"><div class="card-label">step05b.png</div><img src="/img/setup-guide/step05b.png"></div>
    <div class="card"><div class="card-label">step06.png</div><img src="/img/setup-guide/step06.png"></div>
    <div class="card"><div class="card-label">step07.png</div><img src="/img/setup-guide/step07.png"></div>
    <div class="card"><div class="card-label">step08.png</div><img src="/img/setup-guide/step08.png"></div>
    <div class="card"><div class="card-label">step09.png</div><img src="/img/setup-guide/step09.png"></div>
    <div class="card"><div class="card-label">step10.png</div><img src="/img/setup-guide/step10.png"></div>
    <div class="card"><div class="card-label">step11.png</div><img src="/img/setup-guide/step11.png"></div>
    <div class="card"><div class="card-label">step12.png</div><img src="/img/setup-guide/step12.png"></div>
    <div class="card"><div class="card-label">step13.png</div><img src="/img/setup-guide/step13.png"></div>
  </div>
</body>
</html>
