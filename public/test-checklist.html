<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>テストチェックリスト｜経費ログ</title>
  <style>
    :root {
      --ok:   #16a34a;
      --ng:   #dc2626;
      --warn: #d97706;
      --mute: #6b7280;
      --bg:   #f9fafb;
      --card: #ffffff;
      --border: #e5e7eb;
      --accent: #2563eb;
      --irr: #fff7ed;
      --irr-border: #fed7aa;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: #111827; font-size: 14px; }
    header { background: var(--accent); color: #fff; padding: 14px 20px; position: sticky; top: 0; z-index: 10; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    header h1 { font-size: 1rem; font-weight: 700; }
    #progressBar { background: rgba(255,255,255,0.25); border-radius: 99px; height: 8px; flex: 1; max-width: 200px; overflow: hidden; }
    #progressFill { height: 100%; background: #fff; border-radius: 99px; width: 0%; transition: width 0.3s; }
    #progressText { font-size: 0.8rem; white-space: nowrap; }
    main { max-width: 800px; margin: 0 auto; padding: 16px; }
    .legend { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; margin-bottom: 16px; display: flex; flex-wrap: wrap; gap: 12px; font-size: 0.82rem; color: var(--mute); }
    .legend span { display: flex; align-items: center; gap: 4px; }
    section { margin-bottom: 20px; }
    h2 { font-size: 0.95rem; font-weight: 700; color: var(--accent); border-left: 3px solid var(--accent); padding-left: 8px; margin-bottom: 10px; }
    h3 { font-size: 0.82rem; font-weight: 600; color: var(--mute); text-transform: uppercase; letter-spacing: .04em; margin: 12px 0 6px; }
    h3.irr { color: #92400e; }
    .item { background: var(--card); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 6px; display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; transition: background 0.15s; }
    .item.irr { background: var(--irr); border-color: var(--irr-border); }
    .item.done-ok  { background: #f0fdf4; border-color: #bbf7d0; }
    .item.done-ng  { background: #fef2f2; border-color: #fecaca; }
    .item.done-warn{ background: #fffbeb; border-color: #fde68a; }
    .num { font-size: 0.75rem; color: var(--mute); min-width: 22px; padding-top: 1px; font-variant-numeric: tabular-nums; }
    .content { flex: 1; min-width: 0; }
    .op { font-weight: 500; margin-bottom: 3px; line-height: 1.4; }
    .op code { background: #f3f4f6; padding: 1px 4px; border-radius: 4px; font-size: 0.82em; }
    .expect { font-size: 0.8rem; color: #4b5563; line-height: 1.4; }
    .controls { display: flex; gap: 6px; flex-shrink: 0; align-items: flex-start; padding-top: 1px; }
    button.btn { border: none; border-radius: 6px; cursor: pointer; font-size: 1.1rem; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; transition: opacity 0.15s, transform 0.1s; opacity: 0.45; background: transparent; }
    button.btn:hover { opacity: 1; transform: scale(1.1); }
    button.btn.active { opacity: 1; }
    button.btn-ok   { color: var(--ok); }
    button.btn-ng   { color: var(--ng); }
    button.btn-warn { color: var(--warn); }
    .memo-wrap { margin-top: 6px; display: none; }
    .memo-wrap.open { display: block; }
    .memo { width: 100%; border: 1px solid var(--border); border-radius: 6px; padding: 6px 8px; font-size: 0.8rem; resize: vertical; min-height: 48px; font-family: inherit; color: #374151; }
    .memo:focus { outline: none; border-color: var(--accent); }
    .btn-memo { font-size: 0.75rem; color: var(--mute); background: none; border: none; cursor: pointer; padding: 2px 0; text-decoration: underline; }
    .reset-btn { font-size: 0.78rem; color: var(--mute); background: none; border: none; cursor: pointer; text-decoration: underline; margin-left: 8px; }
    .section-stat { font-size: 0.75rem; color: var(--mute); margin-left: 8px; font-weight: normal; }
    @media (max-width: 480px) {
      button.btn { width: 28px; height: 28px; font-size: 1rem; }
    }
  </style>
</head>
<body>

const TOTAL = 83;
let state = {}; // { id: 'ok'|'ng'|'warn'|null, memo: '' }

function load() {
  try { state = JSON.parse(localStorage.getItem('keihi_test_state') || '{}'); } catch(_) { state = {}; }
}
function save() {
  localStorage.setItem('keihi_test_state', JSON.stringify(state));
}
function resetAll() {
  if (!confirm('全チェックをリセットしますか？')) return;
  state = {};
  save();
  render();
}

function setResult(id, val) {
  if (!state[id]) state[id] = {};
  if (state[id].result === val) {
    state[id].result = null;
  } else {
    state[id].result = val;
  }
  save();
  updateItem(id);
  updateProgress();
}

function setMemo(id, val) {
  if (!state[id]) state[id] = {};
  state[id].memo = val;
  save();
}

function toggleMemo(id) {
  const w = document.getElementById(`memo-wrap-${id}`);
  w.classList.toggle('open');
}

function updateItem(id) {
  const el = document.getElementById(`item-${id}`);
  if (!el) return;
  const r = state[id]?.result || null;
  el.className = 'item' + (el.dataset.irr === '1' ? ' irr' : '') + (r ? ` done-${r}` : '');
  ['ok','ng','warn'].forEach(v => {
    const btn = document.getElementById(`btn-${v}-${id}`);
    if (btn) btn.classList.toggle('active', r === v);
  });
}

function updateProgress() {
  const done = Object.values(state).filter(s => s.result).length;
  const pct = Math.round(done / TOTAL * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${done} / ${TOTAL}`;
  // section stats
  DATA.forEach(sec => {
    const ids = sec.groups.flatMap(g => g.items.map(i => i[0]));
    const sdone = ids.filter(id => state[id]?.result).length;
    const el = document.getElementById(`stat-${sec.section}`);
    if (el) el.textContent = `${sdone}/${ids.length}`;
  });
}

function render() {
  const root = document.getElementById('sections');
  root.innerHTML = '';
  DATA.forEach(sec => {
    const ids = sec.groups.flatMap(g => g.items.map(i => i[0]));
    const section = document.createElement('section');
    section.innerHTML = `<h2>${sec.section} <span class="section-stat" id="stat-${CSS.escape(sec.section)}"></span></h2>`;
    sec.groups.forEach(grp => {
      if (grp.label) {
        const h3 = document.createElement('h3');
        h3.className = grp.irr ? 'irr' : '';
        h3.textContent = (grp.irr ? '⚡ ' : '') + grp.label;
        section.appendChild(h3);
      }
      grp.items.forEach(([id, op, exp]) => {
        const r = state[id]?.result || null;
        const memo = state[id]?.memo || '';
        const div = document.createElement('div');
        div.id = `item-${id}`;
        div.dataset.irr = grp.irr ? '1' : '0';
        div.className = 'item' + (grp.irr ? ' irr' : '') + (r ? ` done-${r}` : '');
        div.innerHTML = `
          <span class="num">${id}</span>
          <div class="content">
            <div class="op">${op}</div>
            <div class="expect">期待：${exp}</div>
            <div class="memo-wrap${memo ? ' open' : ''}" id="memo-wrap-${id}">
              <textarea class="memo" placeholder="メモ（バグ内容・再現手順など）" oninput="setMemo(${id},this.value)">${memo}</textarea>
            </div>
            <button class="btn-memo" onclick="toggleMemo(${id})">メモ</button>
          </div>
          <div class="controls">
            <button class="btn btn-ok${r==='ok'?' active':''}" id="btn-ok-${id}" title="正常動作" onclick="setResult(${id},'ok')">✅</button>
            <button class="btn btn-ng${r==='ng'?' active':''}" id="btn-ng-${id}" title="バグあり" onclick="setResult(${id},'ng')">❌</button>
            <button class="btn btn-warn${r==='warn'?' active':''}" id="btn-warn-${id}" title="要確認" onclick="setResult(${id},'warn')">⚠️</button>
          </div>`;
        section.appendChild(div);
      });
    });
    root.appendChild(section);
  });
  updateProgress();
}

load();
render();
</script>
</body>
</html>
