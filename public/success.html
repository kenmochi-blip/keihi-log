<!DOCTYPE html>
<html lang="ja">
<head>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-XCNC24BTGP"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-XCNC24BTGP');
</script>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>お申し込みありがとうございます — 経費ログ</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="canonical" href="https://keihi-log.com/success" />
</head>
<body class="bg-light">
  <div class="container py-5" style="max-width:520px;">
    <div class="text-center mb-4">
      <i class="bi bi-check-circle-fill text-success" style="font-size:3rem;"></i>
      <h1 class="h3 fw-bold mt-3" id="pageTitle">お申し込みありがとうございます</h1>
      <p class="text-muted">ライセンスキーを取得しています...</p>
    </div>
    <div id="result"></div>
  </div>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Google広告コンバージョン用に APP_CONFIG.googleAds を読み込む -->
  <script src="js/config.js"></script>
  <script>
    (async () => {
      const params = new URLSearchParams(location.search);
      const session = params.get('session');
      const el = document.getElementById('result');

      if (!session) {
        el.innerHTML = '<div class="alert alert-danger">無効なURLです。</div>';
        return;
      }

      try {
        // Webhookは非同期のため最大10秒リトライ
        let data = null;
        for (let i = 0; i < 5; i++) {
          if (i > 0) {
            el.innerHTML = `<div class="text-center text-muted small py-2">確認中... (${i}/5)</div>`;
            await new Promise(r => setTimeout(r, 2000));
          }
          const resp = await fetch(`/api/license?session=${encodeURIComponent(session)}`);
          if (resp.ok) { data = await resp.json(); break; }
        }
        if (!data) throw new Error('not_found');

        if (data.trial) {
          const titleEl = document.getElementById('pageTitle');
          if (titleEl) titleEl.textContent = '無料トライアルお申し込みありがとうございます';
          // トライアル登録のコンバージョン計測（1セッション1回・GA4＋任意でGoogle広告）
          // セッション単位の重複発火を防止（リロード対策）
          if (typeof gtag === 'function' && !sessionStorage.getItem('kl_trial_conv')) {
            sessionStorage.setItem('kl_trial_conv', '1');
            // GA4 イベント（GA4管理画面で「キーイベント」に指定するとコンバージョン化）
            try { gtag('event', 'trial_start', { plan: data.plan || '', currency: 'JPY', value: 0 }); } catch (_) {}
            // Google広告コンバージョン（config.js の googleAds が設定されていれば送信）
            const ga = (window.APP_CONFIG && window.APP_CONFIG.googleAds) || {};
            if (ga.conversionId && ga.trialConversionLabel) {
              try { gtag('config', ga.conversionId); } catch (_) {}
              try { gtag('event', 'conversion', { send_to: `${ga.conversionId}/${ga.trialConversionLabel}`, value: 1.0, currency: 'JPY' }); } catch (_) {}
            }
          }
        }

        el.innerHTML = `
          <div class="card shadow-sm">
            <div class="card-body p-4">
              <h5 class="fw-bold mb-3"><i class="bi bi-key-fill me-2 text-primary"></i>ライセンスキー</h5>
              <div class="d-flex align-items-center gap-2 mb-3">
                <code id="licKey" class="flex-grow-1 p-3 bg-light rounded border fw-bold"
                  style="font-size:1.1rem;letter-spacing:1px;word-break:break-all;">${data.licenseKey}</code>
                <button class="btn btn-outline-secondary btn-sm" id="btnCopy" title="コピー">
                  <i class="bi bi-clipboard"></i>
                </button>
              </div>
              <ul class="list-unstyled small text-muted mb-4">
                <li><i class="bi bi-building me-1"></i>${data.company || ''}</li>
                <li><i class="bi bi-envelope me-1"></i>${data.email || ''}</li>
                <li><i class="bi bi-calendar me-1"></i>有効期限: ${data.expiresAt || ''}</li>
              </ul>
              ${data.trial ? `
              <div class="alert alert-warning py-2 small mb-3">
                <i class="bi bi-clock-history me-1"></i>
                <strong>2週間の無料トライアル開始です。</strong>ソロ・チーム問わず全機能をお使いいただけます。<br>
                トライアル終了後は自動課金されません。引き続きご利用の場合は、<strong>2週間以内にアプリの設定タブから有料プランへ切り替え</strong>をお願いします。
              </div>` : `
              <div class="alert alert-info py-2 small mb-3">
                <i class="bi bi-info-circle me-1"></i>
                このキーはメールでも送付されます。下のボタンからアプリを開くとライセンスキーが自動入力されます。
              </div>`}
              <a id="btnOpenApp" href="/app.html" class="btn btn-primary w-100">
                <i class="bi bi-box-arrow-in-right me-1"></i>アプリを開いてセットアップする
              </a>
            </div>
          </div>`;

        if (data.setupCode) {
          document.getElementById('btnOpenApp').href = '/' + data.setupCode;
        }

        document.getElementById('btnCopy').addEventListener('click', () => {
          navigator.clipboard.writeText(data.licenseKey).then(() => {
            document.getElementById('btnCopy').innerHTML = '<i class="bi bi-check"></i>';
            setTimeout(() => {
              document.getElementById('btnCopy').innerHTML = '<i class="bi bi-clipboard"></i>';
            }, 2000);
          });
        });
      } catch (_) {
        el.innerHTML = `
          <div class="alert alert-warning">
            <i class="bi bi-exclamation-triangle me-1"></i>
            ライセンスキーの取得に失敗しました。<br>
            ご購入後にお送りするメールをご確認いただくか、お問い合わせください。
          </div>
          <a href="/" class="btn btn-outline-primary">アプリに戻る</a>`;
      }
    })();
  </script>
</body>
</html>
