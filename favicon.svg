<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- レシート本体（デザイン全体を0.75倍に縮小・中央配置） -->
  <rect x="22" y="18" width="45" height="47" rx="4" fill="#0d6efd"/>

  <!-- 白い横線 -->
  <g fill="white">
    <rect x="28" y="30" width="26" height="3" rx="1.5"/>
    <rect x="28" y="36" width="26" height="3" rx="1.5"/>
    <rect x="28" y="43" width="26" height="3" rx="1.5"/>
    <rect x="28" y="50" width="26" height="3" rx="1.5"/>
    <rect x="28" y="57" width="17" height="3" rx="1.5"/>
    <!-- 右側の短い線 -->
    <rect x="49" y="30" width="9" height="3" rx="1.5"/>
    <rect x="49" y="36" width="9" height="3" rx="1.5"/>
    <rect x="49" y="43" width="9" height="3" rx="1.5"/>
    <rect x="49" y="50" width="9" height="3" rx="1.5"/>
  </g>

  <!-- ギザギザ下端 -->
  <polyline points="22,65 26,60 31,65 35,60 40,65 44,60 49,65 53,60 58,65 62,60 67,65"
    fill="none" stroke="#0d6efd" stroke-width="5" stroke-linejoin="round"/>

  <!-- 緑バッジ（右下） -->
  <circle cx="62" cy="65" r="17" fill="#198754"/>
  <!-- 白チェックマーク -->
  <polyline points="54,65 60,71 71,56"
    fill="none" stroke="white" stroke-width="4"
    stroke-linecap="round" stroke-linejoin="round"/>
</svg>
