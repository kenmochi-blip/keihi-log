<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- レシート本体（青塗り） 全体を右+3・下+5 シフトして中央寄せ -->
  <rect x="13" y="7" width="60" height="62" rx="5" fill="#0d6efd"/>

  <!-- 白い横線（レシートの明細行） -->
  <g fill="white">
    <rect x="21" y="22" width="34" height="4" rx="2"/>
    <rect x="21" y="31" width="34" height="4" rx="2"/>
    <rect x="21" y="40" width="34" height="4" rx="2"/>
    <rect x="21" y="49" width="34" height="4" rx="2"/>
    <rect x="21" y="58" width="22" height="4" rx="2"/>
    <!-- 右側の短い線（日付など） -->
    <rect x="49" y="22" width="12" height="4" rx="2"/>
    <rect x="49" y="31" width="12" height="4" rx="2"/>
    <rect x="49" y="40" width="12" height="4" rx="2"/>
    <rect x="49" y="49" width="12" height="4" rx="2"/>
  </g>

  <!-- ギザギザ下端 -->
  <polyline points="13,69 19,63 25,69 31,63 37,69 43,63 49,69 55,63 61,69 67,63 73,69"
    fill="none" stroke="#0d6efd" stroke-width="7" stroke-linejoin="round"/>

  <!-- 緑バッジ（右下） -->
  <circle cx="67" cy="69" r="22" fill="#198754"/>
  <!-- 白チェックマーク -->
  <polyline points="56,69 64,77 78,57"
    fill="none" stroke="white" stroke-width="5"
    stroke-linecap="round" stroke-linejoin="round"/>
</svg>
