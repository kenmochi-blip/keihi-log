<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- レシート本体（青塗り） -->
  <rect x="10" y="2" width="60" height="70" rx="5" fill="#0d6efd"/>

  <!-- 白い横線（レシートの明細行） -->
  <g fill="white">
    <rect x="18" y="18" width="34" height="4" rx="2"/>
    <rect x="18" y="27" width="34" height="4" rx="2"/>
    <rect x="18" y="36" width="34" height="4" rx="2"/>
    <rect x="18" y="45" width="34" height="4" rx="2"/>
    <rect x="18" y="54" width="22" height="4" rx="2"/>
    <!-- 右側の短い線（日付など） -->
    <rect x="46" y="18" width="12" height="4" rx="2"/>
    <rect x="46" y="27" width="12" height="4" rx="2"/>
    <rect x="46" y="36" width="12" height="4" rx="2"/>
    <rect x="46" y="45" width="12" height="4" rx="2"/>
  </g>

  <!-- ギザギザ下端 -->
  <polyline points="10,72 16,66 22,72 28,66 34,72 40,66 46,72 52,66 58,72 64,66 70,72"
    fill="none" stroke="#0d6efd" stroke-width="7" stroke-linejoin="round"/>

  <!-- 緑バッジ（右下） -->
  <circle cx="71" cy="71" r="22" fill="#198754"/>
  <!-- 白チェックマーク -->
  <polyline points="60,71 68,79 82,59"
    fill="none" stroke="white" stroke-width="5"
    stroke-linecap="round" stroke-linejoin="round"/>
</svg>
