<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- 左下から右上へのグラデーション（画像に合わせた青） -->
    <linearGradient id="receiptGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1565C0"/>
      <stop offset="100%" style="stop-color:#42A5F5"/>
    </linearGradient>
  </defs>

  <!-- Receipt body: 適度な角丸 + W字型の底部（2股ブックマーク形） -->
  <path d="M18,4 L74,4 Q80,4 80,10 L80,62
    L64,80 L50,68 L36,80 L20,62
    L14,62 L14,10 Q14,4 18,4 Z"
    fill="url(#receiptGrad)"/>

  <!-- 横線：上は白・中下は半透明白 -->
  <rect x="24" y="18" width="40" height="6" rx="3" fill="white" opacity="1.0"/>
  <rect x="24" y="30" width="38" height="6" rx="3" fill="white" opacity="0.55"/>
  <rect x="24" y="42" width="34" height="6" rx="3" fill="white" opacity="0.45"/>

  <!-- 緑バッジ -->
  <circle cx="72" cy="75" r="22" fill="#2E7D32"/>
  <!-- 白チェックマーク -->
  <polyline points="61,75 69,83 83,63"
    fill="none" stroke="white" stroke-width="6"
    stroke-linecap="round" stroke-linejoin="round"/>
</svg>
