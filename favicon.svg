<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Receipt body with pointed bottom (receipt tape shape) -->
  <path d="M22,4 L66,4 Q76,4 76,14 L76,58 L49,73 L22,58 L22,14 Q22,4 32,4 Z"
    fill="#0d6efd"/>

  <!-- White lines inside receipt -->
  <rect x="30" y="19" width="22" height="5" rx="2.5" fill="white" opacity="0.9"/>
  <rect x="30" y="30" width="34" height="5" rx="2.5" fill="white" opacity="0.85"/>
  <rect x="30" y="41" width="28" height="5" rx="2.5" fill="white" opacity="0.85"/>

  <!-- Green badge circle -->
  <circle cx="70" cy="72" r="22" fill="#198754"/>
  <!-- White checkmark -->
  <polyline points="59,72 67,80 81,60"
    fill="none" stroke="white" stroke-width="5.5"
    stroke-linecap="round" stroke-linejoin="round"/>
</svg>
